name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: docuverify_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/docuverify_test?schema=public
      SESSION_SECRET: ci-test-secret
      CLIENT_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      - name: Lint
        run: npm run -w backend lint
      - name: Run migrations
        working-directory: backend
        run: npx prisma migrate deploy
      - name: Run tests
        run: npm run -w backend test
      - name: Build
        run: npm run -w backend build

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run -w frontend lint
      - name: Build
        run: npm run -w frontend build
